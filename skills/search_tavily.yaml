name: search_tavily
description: Search the web using Tavily and return results with URLs/snippets.
type: http

request:
  method: POST
  url: https://api.tavily.com/search
  headers:
    Content-Type: application/json
  body:
    api_key: "${TAVILY_API_KEY}"
    query: "{{query}}"
    search_depth: "basic"
    max_results: 10
    include_answer: false
    include_images: false

response:
  type: json